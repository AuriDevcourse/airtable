<!--
  TechBBQ speakers — TechBBQ-styled. Paste into an Elementor "HTML" widget
  (or a WordPress Custom HTML block). Change ENDPOINT to your deployed URL, e.g.
  https://YOUR-PROJECT.vercel.app/api/speakers
  No token here — it stays on the server. Only safe public fields are returned.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<section id="tbbq-speakers" class="tbbq-speakers">
  <p class="tbbq-speakers__loading">Loading speakers…</p>
</section>

<style>
  .tbbq-speakers{
    --bg:#0d0d0d;--card:#131313;--card2:#191919;--fg:#f2f2f2;--muted:#9a9a9c;
    background:var(--bg);color:var(--fg);
    font-family:"Inter",ui-sans-serif,system-ui,sans-serif;
    padding:clamp(24px,4vw,48px);border-radius:20px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;
  }
  .tbbq-speakers__loading{grid-column:1/-1;color:var(--muted);margin:0}
  .tbbq-card{background:var(--card);border-radius:16px;overflow:hidden;transition:background .18s}
  .tbbq-card:hover{background:var(--card2)}
  .tbbq-card a{text-decoration:none;color:inherit;display:block}
  .tbbq-card img{width:100%;aspect-ratio:1/1;object-fit:cover;object-position:50% 30%;display:block;background:#1d1d1d}
  .tbbq-card .ph{width:100%;aspect-ratio:1/1;background:#1d1d1d}
  .tbbq-card .body{padding:20px}
  .tbbq-card h3{font-family:"Onest",sans-serif;font-weight:500;letter-spacing:-.02em;font-size:17px;line-height:1.2;margin:0}
  .tbbq-card p{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.4}
</style>

<script>
(function () {
  var ENDPOINT = "https://YOUR-PROJECT.vercel.app/api/speakers";
  var root = document.getElementById("tbbq-speakers");

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  fetch(ENDPOINT)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var list = (data && data.speakers) || [];
      if (!list.length) { root.innerHTML = '<p class="tbbq-speakers__loading">No speakers yet.</p>'; return; }
      root.innerHTML = list.map(function (s) {
        var img = s.photo
          ? '<img src="' + esc(s.photo) + '" alt="' + esc(s.name) + '" loading="lazy">'
          : '<div class="ph"></div>';
        var meta = esc(s.title) + (s.company ? " · " + esc(s.company) : "");
        var inner = img + '<div class="body"><h3>' + esc(s.name) + '</h3><p>' + meta + '</p></div>';
        var body = s.linkedin
          ? '<a href="' + esc(s.linkedin) + '" target="_blank" rel="noopener">' + inner + '</a>'
          : inner;
        return '<article class="tbbq-card">' + body + '</article>';
      }).join("");
    })
    .catch(function () {
      root.innerHTML = '<p class="tbbq-speakers__loading">Could not load speakers right now.</p>';
    });
})();
</script>
